<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cinematic Universe Creation</title>
    <!-- Include both CSS files -->
    <link rel="stylesheet" href="01/cinematic_starfield.css" />
    <link rel="stylesheet" href="02/the_great_everywhere_shake.css" />
    <!-- Google Fonts for dynamic typography -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Phase 1 elements -->
    <canvas id="starfield_canvas" aria-label="Animated starfield background"></canvas>
    <div id="imagine_fade_text">
      <span class="imagine_bloom_text">Imagine…</span>
    </div>

    <!-- Phase 2 elements (initially hidden) -->
    <canvas id="explosion_canvas" aria-label="Cinematic explosion and shake background" style="display: none"></canvas>
    <div id="everything_fade_text" style="display: none">
      <span class="everything_bloom_text">Everything!</span>
    </div>

    <!-- Load JS files in dependency order -->
    <script src="01/cinematic_starfield_manager.js"></script>
    <script src="01/cinematic_starfield.js"></script>
    <script src="02/the_great_everywhere_shake.js"></script>
  </body>
</html>
