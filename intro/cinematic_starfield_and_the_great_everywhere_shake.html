<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cinematic Universe Creation</title>
    <link rel="stylesheet" href="01/cinematic_starfield.css" />
    <link rel="stylesheet" href="02/the_great_everywhere_shake.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet" />
    <style>
      #audio_setup_interface {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
      }
      .setup_container {
        text-align: center;
        color: #fff;
        font-family: "Orbitron", monospace;
      }
      .setup_button {
        background: #333;
        color: #fff;
        border: 2px solid #666;
        padding: 12px 24px;
        margin: 10px;
        font-family: "Orbitron", monospace;
        font-size: 16px;
        cursor: pointer;
        border-radius: 4px;
        transition: all 0.2s;
      }
      .setup_button:hover {
        background: #555;
        border-color: #888;
      }
      .start_button {
        background: #004400;
        border-color: #006600;
      }
      .start_button:hover {
        background: #006600;
        border-color: #008800;
      }
      .volume_info {
        margin: 20px 0;
        font-size: 14px;
        color: #aaa;
      }
    </style>
    <script src="audio.js"></script>
    <script src="01/cinematic_starfield_manager.js"></script>
    <script src="01/cinematic_starfield.js"></script>
    <script src="02/the_great_everywhere_shake.js"></script>
  </head>
  <body>
    <audio id="cinematic_audio" preload="auto">
      <source src="audio/Also_sprach_Zarathustra.webm" type="audio/webm" />
      Your browser does not support the audio element.
    </audio>

    <audio id="blip_audio" preload="auto">
      <source src="audio/blip.wav" type="audio/wav" />
    </audio>

    <div id="audio_setup_interface">
      <div class="setup_container">
        <button id="test_audio_button" class="setup_button">Test Audio</button>
        <p class="volume_info">↑ ↓ adjust volume</p>
        <button id="start_button" class="setup_button start_button">Start</button>
      </div>
    </div>

    <canvas id="cinematic_canvas"></canvas>
  </body>
</html>
