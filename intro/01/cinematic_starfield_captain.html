<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Starfield Captain - Interactive Flight</title>
    <link rel="stylesheet" href="cinematic_starfield.css" />
  </head>
  <body>
    <canvas id="starfield_canvas" aria-label="Interactive starfield for manual flight"></canvas>

    <!-- Debug controls container (always visible and enabled for captain mode) -->
    <div id="debug_controls" style="display: block">
      <div id="zoom_slider_container">
        <input type="range" id="zoom_speed_slider" min="0" max="0.1" step="0.00005" value="0.001" />
        <label for="zoom_speed_slider" id="zoom_speed_label"></label>
      </div>
      <div id="star_count_slider_container">
        <input type="range" id="star_count_slider" min="20" max="30000" step="1" value="200" />
        <label for="star_count_slider" id="star_count_label"></label>
      </div>
    </div>

    <script src="cinematic_starfield_manager.js"></script>
    <script>
      // Captain mode: Override the animation method to bypass cinematic sequence
      window.addEventListener("DOMContentLoaded", function () {
        const starfield_manager = new CinematicStarfieldManager();
        window.cinematic_starfield_manager = starfield_manager;

        // Enable the sliders
        starfield_manager.star_count_slider.disabled = false;
        starfield_manager.zoom_speed_slider.disabled = false;

        // Set initial values
        starfield_manager.star_count = 200;
        starfield_manager.zoom_speed = 0.0002;

        // Override the animation method to skip cinematic sequence logic
        const original_animate = starfield_manager._animate_starfield;
        starfield_manager._animate_starfield = function (time) {
          // ALWAYS clear the canvas for zoom effect
          this.starfield_context.clearRect(0, 0, this.starfield_width, this.starfield_height);

          // Use current slider values directly (no cinematic overrides)
          const star_count = parseInt(this.star_count_slider.value);
          const zoom_speed = parseFloat(this.zoom_speed_slider.value);

          // Update internal values
          this.star_count = star_count;
          this.zoom_speed = zoom_speed;

          // Update labels
          this.star_count_label.textContent = `Stars: ${star_count}`;
          this.zoom_speed_label.textContent = `Zoom: ${zoom_speed.toFixed(5)}`;

          // Adjust stars array to match current count
          if (this.stars.length < star_count) {
            for (let i = this.stars.length; i < star_count; i++) {
              this.stars.push(this._create_star());
            }
          } else if (this.stars.length > star_count) {
            this.stars.length = star_count;
          }

          // Center of screen for zoom effect
          const center_x = this.starfield_width / 2;
          const center_y = this.starfield_height / 2;

          // Update star positions with PROPER zoom effect
          for (let i = 0; i < this.stars.length; i++) {
            const star = this.stars[i];

            // Move star closer (increase z)
            star.z += zoom_speed;

            // If star gets too close, reset it far away
            if (star.z > 1) {
              star.z = 0.1;
              star.x = this._random_between(0, this.starfield_width);
              star.y = this._random_between(0, this.starfield_height);
            }

            // Calculate screen position based on 3D perspective
            const scale = star.z;
            const dx = star.x - center_x;
            const dy = star.y - center_y;

            // Project 3D position to 2D screen with zoom effect
            star.screen_x = center_x + dx * scale;
            star.screen_y = center_y + dy * scale;
          }

          // Render stars
          const stars_by_color = {};
          for (let i = 0; i < this.stars.length; i++) {
            const star = this.stars[i];

            // Only draw stars that are on screen
            if (star.screen_x >= 0 && star.screen_x <= this.starfield_width && star.screen_y >= 0 && star.screen_y <= this.starfield_height) {
              if (!stars_by_color[star.color]) {
                stars_by_color[star.color] = [];
              }
              stars_by_color[star.color].push(star);
            }
          }

          // Draw stars by color groups
          for (const color in stars_by_color) {
            this.starfield_context.fillStyle = color;
            const color_stars = stars_by_color[color];
            for (let i = 0; i < color_stars.length; i++) {
              const star = color_stars[i];
              const twinkle = 0.7 + 0.3 * Math.sin((time / 1000) * star.twinkle_speed * 1000 + star.twinkle_phase);
              const alpha = twinkle * star.z;

              this.starfield_context.globalAlpha = alpha;
              this.starfield_context.beginPath();
              this.starfield_context.arc(star.screen_x, star.screen_y, star.radius * star.z, 0, Math.PI * 2);
              this.starfield_context.fill();
            }
          }

          if (this.is_running) {
            this.animation_frame_id = requestAnimationFrame(this._animate_starfield);
          }
        }.bind(starfield_manager);

        // Start the animation
        starfield_manager.is_running = true;
        starfield_manager._animate_starfield(performance.now());

        console.log("Starfield Captain mode activated - controls working!");
      });
    </script>
  </body>
</html>
