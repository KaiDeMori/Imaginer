<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Starfield Captain - Interactive Flight</title>
    <link rel="stylesheet" href="cinematic_starfield.css" />
    <style>
      #debug_controls {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 1100;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
      }
      #zoom_slider_container,
      #star_count_slider_container {
        background: rgba(20, 20, 20, 0.92);
        border-radius: 10px;
        padding: 10px 16px 8px 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 170px;
        z-index: 1000;
      }
      #zoom_slider_container {
        margin-bottom: 0px;
      }
      #star_count_slider_container {
        margin-top: 0px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      #star_count_slider {
        width: 120px;
      }
      #star_count_label {
        color: #fff;
        font-size: 0.95em;
        margin-top: 2px;
        font-family: sans-serif;
        user-select: none;
      }
      #zoom_speed_slider {
        width: 120px;
      }
      #zoom_speed_label {
        color: #fff;
        font-size: 0.95em;
        margin-top: 2px;
        font-family: sans-serif;
        user-select: none;
      }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <canvas id="starfield_canvas" aria-label="Interactive starfield for manual flight"></canvas>

    <div id="debug_controls" style="display: block">
      <div id="zoom_slider_container">
        <input type="range" id="zoom_speed_slider" min="0" max="0.1" step="0.00005" value="0.001" />
        <label for="zoom_speed_slider" id="zoom_speed_label"></label>
      </div>
      <div id="star_count_slider_container">
        <input type="range" id="star_count_slider" min="20" max="30000" step="1" value="200" />
        <label for="star_count_slider" id="star_count_label"></label>
      </div>
    </div>

    <script src="cinematic_starfield_manager.js"></script>
    <script>
      const starfieldManager = new CinematicStarfieldManager();
    </script>
  </body>
</html>
