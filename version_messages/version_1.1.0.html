<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Version 1.1.0 Message</title>
  </head>
  <body>
    <style>
      .version_message_content {
        font-size: 1em;
        line-height: 1.5;
        color: #333;
      }
      .star_showcase {
        text-align: center;
        margin: 1em 0;
        padding: 1em;
        background: radial-gradient(circle at center, #f0f8ff 0%, #e6e9f0 100%);
        border-radius: 12px;
        box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.8), 0 5px 10px rgba(0, 0, 0, 0.05);
        border: 1px solid #fff;
      }
      .model_intro {
        font-size: 0.8em;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #666;
        margin-bottom: 0.3em;
      }
      .model_name {
        display: block;
        font-size: 2em;
        font-weight: 900;
        background: linear-gradient(45deg, #ff3cac 0%, #784ba0 50%, #2b86c5 100%);
        background-size: 200% auto;
        background-clip: text;
        color: transparent;
        animation: gradient_move 3s linear infinite, pulse_scale 2s ease-in-out infinite alternate;
      }
      @keyframes gradient_move {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 200% 50%;
        }
      }
      @keyframes pulse_scale {
        from {
          transform: scale(1);
          filter: drop-shadow(0 0 5px rgba(120, 75, 160, 0.3));
        }
        to {
          transform: scale(1.05);
          filter: drop-shadow(0 0 15px rgba(120, 75, 160, 0.6));
        }
      }

      .feature_grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 0.8em;
        margin: 1em 0;
      }
      .feature_item {
        background: #f9f9f9;
        padding: 0.6em;
        border-radius: 6px;
        text-align: center;
        border: 1px solid #eee;
      }
      .feature_icon {
        font-size: 1.2em;
        display: block;
        margin-bottom: 0.2em;
      }

      .subtle_note {
        font-size: 0.8em;
        color: #999;
        text-align: center;
        margin-top: 1.5em;
        padding-top: 0.8em;
        border-top: 1px dashed #eee;
        opacity: 0.8;
        transition: opacity 0.3s;
      }
      .subtle_note:hover {
        opacity: 1;
      }
    </style>
    <div class="version_message_content">
      <h2>🚀 Imaginer 1.1 is live!</h2>

      <div class="star_showcase">
        <div class="model_intro">Introducing the new standard</div>
        <span class="model_name">gpt-image-1.5</span>
      </div>

      <div class="feature_grid">
        <div class="feature_item">
          <span class="feature_icon">🖼️</span>
          <strong>Crisper Details</strong>
        </div>
        <div class="feature_item">
          <span class="feature_icon">📝</span>
          <strong>Steadier Text</strong>
        </div>
        <div class="feature_item">
          <span class="feature_icon">🎨</span>
          <strong>Better Editing</strong>
        </div>
        <div class="feature_item">
          <span class="feature_icon">💸</span>
          <strong>Lower Cost</strong>
        </div>
      </div>

      <div class="subtle_note">🤫 🧩 Conversation mode work continues quietly in the background...</div>
    </div>
    <script type="module">
      (function () {
        // 1. Safety Check: Ensure we are running inside the Imaginer app's version modal
        // We check for the presence of the modal container class which is added by version_message_modal.js
        const is_in_modal = !!document.querySelector(".version_message_modal");
        if (!is_in_modal) {
          console.info("Migration script skipped: Not running inside Imaginer version modal.");
          return;
        }

        // 2. The Logic: Clear model-related localStorage keys
        console.log("Running Imaginer 1.1 migration: Clearing model cache...");
        const MODEL_CACHE_KEY = "imaginer.available_image_models";
        const MODEL_SELECTED_KEY = "imaginer.selected_image_model";

        localStorage.removeItem(MODEL_CACHE_KEY);
        localStorage.removeItem(MODEL_SELECTED_KEY);

        console.log("Imaginer 1.1 migration complete.");
      })();
    </script>
  </body>
</html>
