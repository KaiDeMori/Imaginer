<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Version 1.6.0 Message</title>
  </head>
  <body>
    <style>
      .version_message_content {
        font-size: 1em;
        line-height: 1.6;
        color: #333;
      }
      .star_showcase {
        text-align: center;
        margin: 1.2em 0;
        padding: 1.2em 1em;
        background: radial-gradient(circle at center, #fffbe6 0%, #f0eaff 50%, #e6f0ff 100%);
        border-radius: 14px;
        box-shadow: inset 0 0 24px rgba(255, 255, 255, 0.9), 0 6px 12px rgba(0, 0, 0, 0.06);
        border: 1px solid #fff;
      }
      .model_intro {
        font-size: 0.75em;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #888;
        margin-bottom: 0.2em;
      }
      .model_name {
        display: inline-block;
        font-size: 2.2em;
        font-weight: 900;
        background: linear-gradient(135deg, #f59e0b 0%, #ef4444 25%, #ec4899 50%, #8b5cf6 75%, #3b82f6 100%);
        background-size: 300% auto;
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        animation: gradient_shift 4s linear infinite, gentle_breathe 3s ease-in-out infinite alternate;
      }
      @keyframes gradient_shift {
        0% { background-position: 0% 50%; }
        100% { background-position: 300% 50%; }
      }
      @keyframes gentle_breathe {
        from {
          transform: scale(1);
          filter: drop-shadow(0 0 6px rgba(139, 92, 246, 0.3));
        }
        to {
          transform: scale(1.04);
          filter: drop-shadow(0 0 18px rgba(239, 68, 68, 0.5));
        }
      }
      .model_tagline {
        margin-top: 0.6em;
        font-size: 0.85em;
        color: #666;
      }
      .refresh_hint {
        margin-top: 0.8em;
        font-size: 0.75em;
        color: #999;
      }
      .feature_grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 0.8em;
        margin: 1.2em 0;
      }
      .feature_item {
        background: #f9f9f9;
        padding: 0.6em;
        border-radius: 6px;
        text-align: center;
        border: 1px solid #eee;
      }
      .feature_icon {
        font-size: 1.2em;
        display: block;
        margin-bottom: 0.2em;
      }
      .subtle_note {
        font-size: 0.8em;
        color: #999;
        text-align: center;
        margin-top: 1.5em;
        padding-top: 0.8em;
        border-top: 1px dashed #eee;
        opacity: 0.8;
        transition: opacity 0.3s;
      }
      .subtle_note:hover {
        opacity: 1;
      }
    </style>
    <div class="version_message_content">
      <h2>🎉 Imaginer 1.6 — the BIG one.</h2>

      <div class="star_showcase">
        <div class="model_intro">Now powered by</div>
        <span class="model_name">gpt-image-2</span>
        <div class="model_tagline">OpenAI's most capable image model yet.</div>
        <div class="refresh_hint">Model Refresh: <strong>Settings (⚙️) › Advanced › Refresh Models</strong></div>
      </div>

      <div class="feature_grid">
        <div class="feature_item">
          <span class="feature_icon">🔬</span>
          <strong>Insane Detail</strong>
        </div>
        <div class="feature_item">
          <span class="feature_icon">🔤</span>
          <strong>Readable Text</strong>
        </div>
        <div class="feature_item">
          <span class="feature_icon">🎭</span>
          <strong>Style Range</strong>
        </div>
        <div class="feature_item">
          <span class="feature_icon">⚡</span>
          <strong>Faster</strong>
        </div>
      </div>

      <div class="subtle_note">Same Imaginer you know. Wildly better images. ✨</div>
    </div>
    <script type="module">
      (function () {
        const is_in_modal = !!document.querySelector(".version_message_modal");
        if (!is_in_modal) {
          console.info("Migration script skipped: Not running inside Imaginer version modal.");
          return;
        }

        console.log("Running Imaginer 1.6 migration: Clearing model cache...");
        const MODEL_CACHE_KEY = "imaginer.available_image_models";
        const MODEL_SELECTED_KEY = "imaginer.selected_image_model";

        localStorage.removeItem(MODEL_CACHE_KEY);
        localStorage.removeItem(MODEL_SELECTED_KEY);

        console.log("Imaginer 1.6 migration complete.");
      })();
    </script>
  </body>
</html>
