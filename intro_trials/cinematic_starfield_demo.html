<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cinematic Starfield Demo</title>
    <link rel="stylesheet" href="cinematic_starfield_demo.css">
</head>
<body>
<canvas id="starfield_canvas" aria-label="Animated starfield background"></canvas>
<!-- Debug controls container (set display:none to hide all debug controls) -->
<div id="debug_controls" style="display: block;">
  <div id="zoom_slider_container">
    <input type="range" id="zoom_speed_slider" min="0" max="0.1" step="0.00005" value="0.0002">
    <label for="zoom_speed_slider" id="zoom_speed_label">Zoom: 0.00020</label>
  </div>
  <div id="star_count_slider_container">
    <input type="range" id="star_count_slider" min="20" max="1000" step="1" value="200">
    <label for="star_count_slider" id="star_count_label">Stars: 200</label>
  </div>
</div>
<!-- Cinematic fade-in text overlay -->
<div id="imagine_fade_text" style="
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 2000;
  opacity: 0;
  transition: opacity 2.5s cubic-bezier(0.4,0,0.2,1);
">
  <span style="
    color: #fff;
    font-size: 3.2em;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-weight: bold;
    text-shadow: 0 2px 16px #000, 0 0 32px #fff2;
    letter-spacing: 0.04em;
    ">Imagine…</span>
</div>
    <!-- CSS moved to cinematic_starfield_demo.css -->
    <!-- JS moved to separate files -->
    <script src="cinematic_starfield_manager.js"></script>
    <script src="cinematic_starfield_demo.js"></script>
</body>
</html>
