<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Linear-Speed Canvas Zoom Demo</title>
<style>
    /* Eliminate scrollbars and make the canvas fill the viewport */
    html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
    }
    canvas {
        display: block;
        width: 100vw;
        height: 100vh;
    }
</style>
</head>
<body>
<canvas></canvas>

<script>
/* ------------ CONFIGURATION ------------ */
const IMAGE_SRC = 'zoom_images/60_alien_island.png';   // replace with the actual file name
const TEMPO_PX_PER_SEC = 50;         // visible-diameter growth speed
const INITIAL_SCALE = 0.01;           // image starts at 25 % of its original size
/* --------------------------------------- */

const canvas   = document.querySelector('canvas');
const ctx      = canvas.getContext('2d');
let   viewport = { w: window.innerWidth, h: window.innerHeight };

function resizeCanvas() {
    viewport.w = window.innerWidth;
    viewport.h = window.innerHeight;
    canvas.width  = viewport.w;
    canvas.height = viewport.h;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

/* ---------- image preload ---------- */
const img = new Image();
img.src   = IMAGE_SRC;
img.onload = () => startZoom(img);

/* ---------- zoom animation ---------- */
function startZoom(image) {
    const d0      = image.width;      // source bitmap side length (square assumed)
    let   scale   = INITIAL_SCALE;    // current scale multiplier
    let   lastTS  = performance.now();

    function frame(now) {
        const dt = (now - lastTS) / 1000;           // seconds since last frame
        lastTS   = now;

        scale += (TEMPO_PX_PER_SEC * dt) / d0;      // additive update: linear pixel growth

        // clear & redraw
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const drawSize = d0 * scale;                // rendered side length in px
        const x = (viewport.w - drawSize) / 2;
        const y = (viewport.h - drawSize) / 2;
        ctx.drawImage(image, x, y, drawSize, drawSize);

        // stop when the image completely fills the smaller viewport dimension
        const target = Math.min(viewport.w, viewport.h);
        if (drawSize < target) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
}
</script>
</body>
</html>
