<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <title>final_recursive_reveal_trials</title>
   <style>
      html,
      body {
         margin: 0;
         padding: 0;
         background: #181a1b;
         width: 100vw;
         height: 100vh;
         overflow: hidden;
      }

      #main_canvas {
         display: block;
         width: 100vw;
         height: 100vh;
         background: #181a1b;
      }

      #controls_panel {
         margin: 1em;
      }

      #ui_overlay {
         position: absolute;
         top: 0;
         left: 0;
         width: 100vw;
         z-index: 10;
         pointer-events: none;
      }

      #ui_overlay>* {
         pointer-events: auto;
      }
   </style>

   <script src="../planetwise/webgl/infinity_zoom_II/infinity_zoom_debug.js" defer></script>
   <script src="../planetwise/webgl/infinity_zoom_II/infinity_zoom_preloader.js" defer></script>
   <script src="../planetwise/webgl/infinity_zoom_II/infinity_zoom_II_utils_math.js" defer></script>
   <script src="../planetwise/webgl/infinity_zoom_II/infinity_zoom_II_utils_render.js" defer></script>
   <script src="../planetwise/webgl/infinity_zoom_II/infinity_zoom_II_engine.js" defer></script>
</head>

<body>
   <div id="ui_overlay">
      <h1>final_recursive_reveal_trials</h1>
      <div id="controls_panel">
         <button id="start_transition_btn">start_transition</button>
         <button id="reset_btn">reset</button>
      </div>
   </div>
   <canvas id="main_canvas"></canvas>
   <script>
      // Layer data for the alien closeup (as in the last layer of the real engine)
      const LAYER_DATA = [
         { zoom: 25, image: '100_alien_closeup.png' }
      ];
      const IMAGE_FOLDER = '../planetwise/zoom_images_planete';

      // Utility: load a single image as a Promise
      function load_image(src) {
         return new Promise((resolve, reject) => {
            const img = new window.Image();
            img.onload = () => resolve(img);
            img.onerror = reject;
            img.src = src;
         });
      }

      // Main setup
      const canvas = document.getElementById('main_canvas');
      let engine = null;
      let loaded_images = [];

      async function setup_engine() {
         // Load all images for layers
         loaded_images = await Promise.all(
            LAYER_DATA.map(layer => load_image(`${IMAGE_FOLDER}/${layer.image}`))
         );
         // Initialize engine
         engine = window.infinity_zoom_II_engine;
         engine.init(LAYER_DATA, loaded_images, canvas);
      }

      // Button handlers
      document.getElementById('start_transition_btn').addEventListener('click', () => {
         if (!engine) return;
         // For now, just restart the engine (simulate transition start)
         engine.init(LAYER_DATA, loaded_images, canvas);
      });
      document.getElementById('reset_btn').addEventListener('click', () => {
         if (!engine) return;
         // For now, just restart the engine (simulate reset)
         engine.init(LAYER_DATA, loaded_images, canvas);
      });

      // On load, setup engine
      setup_engine();
   </script>
</body>

</html>
