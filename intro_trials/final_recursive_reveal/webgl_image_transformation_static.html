<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="utf-8" />
   <title>WebGL - image region transform (static)</title>
   <style>
      html,
      body {
         margin: 0;
         height: 100%;
         overflow: hidden;
         background: #000;
         color: #eee;
         font-family: sans-serif
      }

      #glcanvas {
         display: block;
         width: 100%;
         height: 100%;
      }

      #ui {
         position: fixed;
         top: 1rem;
         left: 1rem;
         z-index: 10
      }

      button {
         padding: .4rem .8rem;
         font-size: 1rem;
         cursor: pointer
      }
   </style>
</head>

<body>
   <canvas id="glcanvas"></canvas>
   <div id="ui"><button id="btn">show region</button></div>
   <script>
      const IMAGE_URL = '../planetwise/zoom_images_planete/debug/100_alien_closeup_debug_display_square.png';
      const REGION = {
         p0: { x: 170, y: 492 },
         p1: { x: 354, y: 424 },
         p2: { x: 421, y: 607 },
         p3: { x: 237, y: 675 }
      };
      const canvas = document.getElementById('glcanvas');
      const gl = canvas.getContext('webgl');
      if (!gl) { alert('WebGL not supported'); }
      let program, vbo, ibo, uTransformLoc, uTexLoc, texture, imgSide;
      let transformStart, transformRegion, currentTransform;

      // ========== matrix helpers (row-major 3×3) ==========
      function matMul(a, b) { // a,b Float32Array(9) row-major
         const out = new Float32Array(9);
         for (let r = 0; r < 3; ++r) for (let c = 0; c < 3; ++c) {
            out[r * 3 + c] = a[r * 3 + 0] * b[0 * 3 + c] + a[r * 3 + 1] * b[1 * 3 + c] + a[r * 3 + 2] * b[2 * 3 + c];
         }
         return out;
      }
      function matIdent() { return new Float32Array([1, 0, 0, 0, 1, 0, 0, 0, 1]); }
      function matTranslate(tx, ty) { return new Float32Array([1, 0, tx, 0, 1, ty, 0, 0, 1]); }
      function matScale(s) { return new Float32Array([s, 0, 0, 0, s, 0, 0, 0, 1]); }
      function matRotate(theta) { const c = Math.cos(theta), s = Math.sin(theta); return new Float32Array([c, -s, 0, s, c, 0, 0, 0, 1]); }

      function buildRegionTransform(canvasW, canvasH, L, cx, cy, theta) {
         const s = Math.max(canvasW / L, canvasH / L);
         const T0 = matTranslate(-cx, -cy);
         const R = matRotate(-theta);
         const S = matScale(s);
         const T1 = matTranslate(canvasW * 0.5, canvasH * 0.5);
         let A = matMul(T1, matMul(S, matMul(R, T0)));
         // orthographic to clip
         const P = new Float32Array([2 / canvasW, 0, -1, 0, -2 / canvasH, 1, 0, 0, 1]);
         return matMul(P, A);
      }

      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight); if (imgSide) { recomputeTransforms(); draw(); } }
      window.addEventListener('resize', resize);

      function recomputeTransforms() {
         const cw = canvas.width, ch = canvas.height;
         // start (whole image)
         const cx0 = imgSide * 0.5, cy0 = imgSide * 0.5, L0 = imgSide, theta0 = 0;
         transformStart = buildRegionTransform(cw, ch, L0, cx0, cy0, theta0);
         // region
         const p0 = REGION.p0, p1 = REGION.p1, p2 = REGION.p2;
         const vx = p1.x - p0.x, vy = p1.y - p0.y;
         const L = Math.hypot(vx, vy);
         const theta = Math.atan2(vy, vx);
         const cx = 0.5 * (p0.x + p2.x), cy = 0.5 * (p0.y + p2.y);
         transformRegion = buildRegionTransform(cw, ch, L, cx, cy, theta);
         currentTransform = transformStart;
      }

      function initGL() {
         const vsSrc = `attribute vec2 aPos;attribute vec2 aUV;uniform mat3 uM;varying vec2 vUV;void main(){vec3 p=uM*vec3(aPos,1.0);gl_Position=vec4(p.xy,0.0,1.0);vUV=aUV;}`;
         const fsSrc = `precision highp float;varying vec2 vUV;uniform sampler2D uTex;void main(){gl_FragColor=texture2D(uTex,vUV);}`;
         program = gl.createProgram(); const vs = gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(vs, vsSrc); gl.compileShader(vs); const fs = gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(fs, fsSrc); gl.compileShader(fs); gl.attachShader(program, vs); gl.attachShader(program, fs); gl.linkProgram(program); gl.useProgram(program);
         // quad vertices (two triangles strip)  (x,y,u,v)
         const quad = new Float32Array([0, 0, 0, 0, imgSide, 0, 1, 0, 0, imgSide, 0, 1, imgSide, imgSide, 1, 1]);
         vbo = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, vbo); gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);
         const aPos = gl.getAttribLocation(program, 'aPos'); const aUV = gl.getAttribLocation(program, 'aUV'); gl.enableVertexAttribArray(aPos); gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 16, 0); gl.enableVertexAttribArray(aUV); gl.vertexAttribPointer(aUV, 2, gl.FLOAT, false, 16, 8);
         uTransformLoc = gl.getUniformLocation(program, 'uM'); uTexLoc = gl.getUniformLocation(program, 'uTex');
         texture = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, texture); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
         gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, imgSide, imgSide, 0, gl.RGBA, gl.UNSIGNED_BYTE, null); // allocate
         gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, gl.RGBA, gl.UNSIGNED_BYTE, image);
         gl.uniform1i(uTexLoc, 0);
      }

      function draw() {
         gl.clear(gl.COLOR_BUFFER_BIT);
         gl.uniformMatrix3fv(uTransformLoc, false, currentTransform);
         gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      }

      document.getElementById('btn').addEventListener('click', () => { currentTransform = (currentTransform === transformStart) ? transformRegion : transformStart; draw(); });

      let image = new Image();
      image.src = IMAGE_URL;
      image.onload = () => {
         imgSide = image.naturalWidth; // square guaranteed
         // need to rebuild quad now that we know side length
         initGL();
         resize();
      };
   </script>
</body>

</html>
