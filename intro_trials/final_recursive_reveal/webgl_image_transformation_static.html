<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>WebGL – region-to-canvas transform (static)</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      #gl {
        display: block;
        width: 100%;
        height: 100%;
      }

      #ui {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 10;
      }
    </style>
  </head>

  <body>
    <div id="ui"><button id="btn">Show region</button></div>
    <canvas id="gl"></canvas>
    <script>
      //debug square
      // const REGION = {
      //   p0: { x: 170, y: 492 },
      //   p1: { x: 354, y: 424 },
      //   p2: { x: 421, y: 607 },
      //   p3: { x: 237, y: 675 },
      // };

      //debug rectangle
      const REGION = {
        p0: { x: 260, y: 530 }, // origin (top-left)
        p1: { x: 470, y: 341 }, // end of top edge (u-axis)
        p2: { x: 564, y: 445 }, // far corner (bottom-right)
        p3: { x: 353, y: 635 }, // end of left edge (v-axis)
      };

      const INITIAL_ROTATION = Math.random() * Math.PI * 2; // in radians

      const IMAGE_URL =
        "../planetwise/zoom_images_planete/debug/100_alien_closeup_debug_display_extreme_AR.png";
      let gl, program, tex, uniformM;
      let side = 0; // texture side length (px)
      let startMatrix, endMatrix; // mat3, column-major
      let trsStart, trsEnd; // {cx, cy, scale, theta}

      let showingRegion = false;

      // ────────────────────────────── matrix helpers (column-major 3×3)
      function mMul(a, b) {
        // c = a * b
        const c = new Float32Array(9);
        for (
          let i = 0;
          i < 3;
          ++i // row
        )
          for (let j = 0; j < 3; ++j) {
            // col
            let s = 0;
            for (let k = 0; k < 3; ++k) s += a[i + k * 3] * b[k + j * 3];
            c[i + j * 3] = s;
          }
        return c;
      }
      function mTranslate(tx, ty) {
        return new Float32Array([1, 0, 0, 0, 1, 0, tx, ty, 1]);
      }
      function mScale(s) {
        return new Float32Array([s, 0, 0, 0, s, 0, 0, 0, 1]);
      }
      function mRotate(a) {
        const c = Math.cos(a),
          s = Math.sin(a);
        return new Float32Array([c, s, 0, -s, c, 0, 0, 0, 1]);
      }
      function mOrtho(w, h) {
        return new Float32Array([2 / w, 0, 0, 0, -2 / h, 0, -1, 1, 1]);
      }

      // ────────────────────────────── interpolation helpers

      function lerp(a, b, t) {
        return a * (1 - t) + b * t;
      }
      function lerpAngle(a, b, t) {
        // Interpolate angle a to b, taking shortest path
        let d = b - a;
        while (d > Math.PI) d -= 2 * Math.PI;
        while (d < -Math.PI) d += 2 * Math.PI;
        return a + d * t;
      }

      function buildTRSMatrix(trs, w, h) {
        // Compose ortho * T1 * S * R * T0
        const P = mOrtho(w, h);
        return mMul(
          P,
          mMul(
            mMul(
              mMul(mTranslate(w * 0.5, h * 0.5), mScale(trs.scale)),
              mRotate(trs.theta)
            ),
            mTranslate(-trs.cx, -trs.cy)
          )
        );
      }

      // ────────────────────────────── animation

      let animating = false;
      let animT = 0; // 0=start, 1=end
      let animDir = 1; // 1: to region, -1: to full image
      let animStartTime = 0;
      const ANIM_DURATION = 800; // ms

      function animateStep(ts) {
        if (!animating) return;
        if (!animStartTime) animStartTime = ts;
        let t = (ts - animStartTime) / ANIM_DURATION;
        t = Math.min(Math.max(t, 0), 1);
        animT = animDir === 1 ? t : 1 - t;

        // Interpolate TRS
        const trs = {
          cx: lerp(trsStart.cx, trsEnd.cx, animT),
          cy: lerp(trsStart.cy, trsEnd.cy, animT),
          scale: lerp(trsStart.scale, trsEnd.scale, animT),
          theta: lerpAngle(trsStart.theta, trsEnd.theta, animT),
        };
        // Build and set matrix
        const canvas = document.getElementById("gl");
        const mat = buildTRSMatrix(trs, canvas.width, canvas.height);
        gl.clearColor(0, 0, 0, 1);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.uniformMatrix3fv(uniformM, false, mat);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

        if (t < 1) {
          requestAnimationFrame(animateStep);
        } else {
          animating = false;
          showingRegion = animDir === 1;
          document.getElementById("btn").textContent = showingRegion
            ? "Show full image"
            : "Show region";
        }
      }

      // ────────────────────────────── build matrices for current canvas size
      function buildMatrices(w, h) {
        const P = mOrtho(w, h);
        // ===== START (whole image covers canvas) =====
        const cStart = { x: side * 0.5, y: side * 0.5 };
        const sStart = Math.max(w / side, h / side);
        const Astart = mMul(
          mMul(
            mMul(mTranslate(w * 0.5, h * 0.5), mScale(sStart)),
            mRotate(INITIAL_ROTATION)
          ),
          mTranslate(-cStart.x, -cStart.y)
        );

        startMatrix = mMul(P, Astart);
        // ===== END (selected square covers canvas) =====
        // Compute region axes

        // top edge
        const vx = REGION.p1.x - REGION.p0.x;
        const vy = REGION.p1.y - REGION.p0.y;
        // left edge
        const ux = REGION.p3.x - REGION.p0.x;
        const uy = REGION.p3.y - REGION.p0.y;

        // width (top edge length)
        const W = Math.hypot(vx, vy);
        // height (left edge length)
        const H = Math.hypot(ux, uy);

        // orientation
        const theta = Math.atan2(vy, vx);

        const cEnd = {
          x: (REGION.p0.x + REGION.p2.x) * 0.5,
          y: (REGION.p0.y + REGION.p2.y) * 0.5,
        };

        const sEnd = Math.max(w / W, h / H);

        trsStart = {
          cx: cStart.x,
          cy: cStart.y,
          scale: sStart,
          theta: INITIAL_ROTATION,
        };
        trsEnd = {
          cx: cEnd.x,
          cy: cEnd.y,
          scale: sEnd,
          theta: -theta,
        };

        const Aend = mMul(
          mMul(
            mMul(mTranslate(w * 0.5, h * 0.5), mScale(sEnd)),
            mRotate(-theta)
          ),
          mTranslate(-cEnd.x, -cEnd.y)
        );
        endMatrix = mMul(P, Aend);
      }
      // ────────────────────────────── draw
      function draw() {
        gl.clearColor(0, 0, 0, 1);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.uniformMatrix3fv(
          uniformM,
          false,
          showingRegion ? endMatrix : startMatrix
        );
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      }
      // ────────────────────────────── init
      function init() {
        const canvas = document.getElementById("gl");
        gl = canvas.getContext("webgl");
        if (!gl) {
          alert("WebGL not available");
          return;
        }
        const vsSrc = `precision mediump float;attribute vec2 aPosition;attribute vec2 aTex;uniform mat3 uM;varying vec2 vTex;void main(){vec3 p=uM*vec3(aPosition,1.0);gl_Position=vec4(p.xy,0.0,1.0);vTex=aTex;}`;
        const fsSrc = `precision mediump float;varying vec2 vTex;uniform sampler2D uTex;void main(){gl_FragColor=texture2D(uTex,vTex);}`;
        const vs = gl.createShader(gl.VERTEX_SHADER);
        gl.shaderSource(vs, vsSrc);
        gl.compileShader(vs);
        const fs = gl.createShader(gl.FRAGMENT_SHADER);
        gl.shaderSource(fs, fsSrc);
        gl.compileShader(fs);
        program = gl.createProgram();
        gl.attachShader(program, vs);
        gl.attachShader(program, fs);
        gl.linkProgram(program);
        gl.useProgram(program);
        uniformM = gl.getUniformLocation(program, "uM");
        const img = new Image();
        img.onload = () => {
          side = img.width; // square, so height == width
          // create buffers now that we know "side"
          const pos = new Float32Array([0, 0, side, 0, 0, side, side, side]);
          const uv = new Float32Array([0, 0, 1, 0, 0, 1, 1, 1]);
          const posBuf = gl.createBuffer();
          gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
          gl.bufferData(gl.ARRAY_BUFFER, pos, gl.STATIC_DRAW);
          const locPos = gl.getAttribLocation(program, "aPosition");
          gl.enableVertexAttribArray(locPos);
          gl.vertexAttribPointer(locPos, 2, gl.FLOAT, false, 0, 0);
          const uvBuf = gl.createBuffer();
          gl.bindBuffer(gl.ARRAY_BUFFER, uvBuf);
          gl.bufferData(gl.ARRAY_BUFFER, uv, gl.STATIC_DRAW);
          const locUV = gl.getAttribLocation(program, "aTex");
          gl.enableVertexAttribArray(locUV);
          gl.vertexAttribPointer(locUV, 2, gl.FLOAT, false, 0, 0);
          // texture
          tex = gl.createTexture();
          gl.bindTexture(gl.TEXTURE_2D, tex);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
          gl.texImage2D(
            gl.TEXTURE_2D,
            0,
            gl.RGBA,
            gl.RGBA,
            gl.UNSIGNED_BYTE,
            img
          );
          resize();
          draw();
        };
        img.src = IMAGE_URL;
        window.addEventListener("resize", () => {
          resize();
          draw();
        });
        document.getElementById("btn").addEventListener("click", () => {
          if (animating) return;
          animating = true;
          animDir = showingRegion ? -1 : 1;
          animStartTime = 0;
          requestAnimationFrame(animateStep);
        });
      }
      function resize() {
        const canvas = document.getElementById("gl");
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        gl.viewport(0, 0, canvas.width, canvas.height);
        buildMatrices(canvas.width, canvas.height);
      }
      init();
    </script>
  </body>
</html>
