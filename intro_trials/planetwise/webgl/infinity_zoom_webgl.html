<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Infinity Zoom – WebGL</title>
   <style>
      html,
      body {
         margin: 0;
         padding: 0;
         width: 100vw;
         height: 100vh;
         overflow: hidden;
         background: #111;
      }

      #zoom-canvas {
         display: block;
         position: fixed;
         top: 0;
         left: 0;
         width: 100vw;
         height: 100vh;
         background: #111;
      }
   </style>
</head>

<body>
   <canvas id="zoom-canvas"></canvas>
   <script src="../infinity_zoom_testbed_debug.js"></script>
   <script src="../infinity_zoom_preloader.js"></script>
   <script src="infinity_zoom_webgl_engine.js"></script>
   <script>
      // Infinity Zoom – WebGL Engine (initial integration with preloader)

      // Example LAYERS_DATA (should match your actual data)
      const LAYERS_DATA = [
         { zoom: 25, image: '60_alien_island.png' },
         { zoom: 25, image: '70_alien_forest.png' },
         { zoom: 25, image: '80_alien_village.png' },
         { zoom: 25, image: '90_alien_hut.png' },
         { zoom: 25, image: '100_alien_closeup.png' },
      ];

      window.addEventListener('DOMContentLoaded', () => {
         const canvas = document.getElementById('zoom-canvas');
         // Start preloading images as early as possible
         window.infinity_zoom_preloader.preload_images(LAYERS_DATA, '../zoom_images');
         window.infinity_zoom_preloader.on_images_loaded((images) => {
            // At this point, images[] is ready and matches LAYERS_DATA order
            log('[WebGL] All images loaded, starting engine...');
            window.infinity_zoom_webgl_engine.start_infinity_zoom_webgl(canvas, LAYERS_DATA, images);
         });
      });
   </script>
</body>

</html>
