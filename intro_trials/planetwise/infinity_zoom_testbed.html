<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Zoom Animation Testbed</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #111;
        }
        #zoom_canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: #111;
        }
        #loading_message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: sans-serif;
            font-size: 2em;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="zoom_canvas"></canvas>
    <div id="loading_message">Loading images...</div>
    <script>
        // === Configurable Data ===
        const IMAGE_FOLDER = 'zoom_images'; // Folder containing the images (relative to HTML file)
        const LAYERS_DATA = [
            { zoom: 25, image: '60_alien_island.png' },
            { zoom: 25, image: '70_alien_forest.png' },
            { zoom: 25, image: '80_alien_village.png' },
            { zoom: 25, image: '90_alien_hut.png' }
        ];

        // === Globals ===
        let loaded_images = [];
        let all_images_loaded = false;
        let canvas, ctx;
        let canvas_width = 0, canvas_height = 0;
        let animation_frame_id = null;

        // Animation state
        let zoom_progress = 0; // 0 = start, increases to LAYERS_DATA.length
        const ZOOM_SPEED = 0.015; // Adjust for faster/slower zoom
        const MIN_VISIBLE_SCALE = 0.01; // Minimal scale threshold for visibility

        // === Image Preloading ===
        function preload_images(layer_data, on_complete) {
            let images_to_load = layer_data.length;
            let images = new Array(images_to_load);
            let loaded_count = 0;
            layer_data.forEach((layer, idx) => {
                const img = new window.Image();
                img.onload = () => {
                    loaded_count++;
                    if (loaded_count === images_to_load) {
                        on_complete(images);
                    }
                };
                img.onerror = () => {
                    console.error('Failed to load image:', layer.image);
                    loaded_count++;
                    if (loaded_count === images_to_load) {
                        on_complete(images);
                    }
                };
                img.src = IMAGE_FOLDER + '/' + layer.image;
                images[idx] = img;
            });
        }

        // === Canvas Setup ===
        function resize_canvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas_width = canvas.width;
            canvas_height = canvas.height;
        }

        window.addEventListener('resize', resize_canvas);

        // === Animation Loop ===
        function start_animation() {
            document.getElementById('loading_message').style.display = 'none';
            zoom_progress = 0;
            animation_loop();
        }

        function animation_loop() {
            ctx.clearRect(0, 0, canvas_width, canvas_height);
            // Calculate which layers are visible and their scales
            let current_zoom = 1;
            let progress = zoom_progress;
            for (let i = 0; i < LAYERS_DATA.length; i++) {
                let layer = LAYERS_DATA[i];
                let img = loaded_images[i];
                let layer_zoom = layer.zoom / 100;
                // Each layer's scale is the product of all previous zooms, plus progress
                let layer_progress = Math.max(0, Math.min(1, progress));
                let scale = current_zoom * Math.pow(layer_zoom, layer_progress);
                if (scale > MIN_VISIBLE_SCALE && img && img.complete) {
                    draw_layer(img, scale);
                }
                current_zoom *= layer_zoom;
                progress -= 1;
            }
            // Advance zoom progress
            zoom_progress += ZOOM_SPEED;
            if (zoom_progress > LAYERS_DATA.length) {
                zoom_progress = 0; // Loop
            }
            animation_frame_id = requestAnimationFrame(animation_loop);
        }

        // === Drawing Logic ===
        function draw_layer(img, scale) {
            // Scale image to fill the viewport, centered
            const img_w = img.width;
            const img_h = img.height;
            // Compute scale to cover viewport
            let scale_x = canvas_width / img_w * scale;
            let scale_y = canvas_height / img_h * scale;
            let draw_scale = Math.max(scale_x, scale_y);
            let draw_w = img_w * draw_scale;
            let draw_h = img_h * draw_scale;
            let draw_x = (canvas_width - draw_w) / 2;
            let draw_y = (canvas_height - draw_h) / 2;
            ctx.drawImage(img, draw_x, draw_y, draw_w, draw_h);
        }

        // === Init ===
        window.onload = function() {
            canvas = document.getElementById('zoom_canvas');
            ctx = canvas.getContext('2d');
            resize_canvas();
            preload_images(LAYERS_DATA, function(images) {
                loaded_images = images;
                all_images_loaded = true;
                start_animation();
            });
        };
    </script>
</body>
</html>
