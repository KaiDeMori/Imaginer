<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <title>Infinity Zoom Testbed</title>
   <link rel="stylesheet" href="infinity_zoom_testbed.css">
</head>

<body>
   <canvas id="zoom_canvas"></canvas>
   <script src="infinity_zoom_testbed_debug.js"></script>
   <script src="infinity_zoom_preloader.js"></script>
   <script src="infinity_zoom_engine.js"></script>
   <script src="infinity_zoom_testbed.js"></script>
   <script>
      //Seems to work
      // Start loading images as early as possible, after LAYERS_DATA is defined
      window.infinity_zoom_preloader.preload_images(LAYERS_DATA);
      window.infinity_zoom_preloader.on_images_loaded(function (images) {
         setup_canvas();
         // Start the infinity zoom animation after canvas and images are ready
         window.infinity_zoom_engine.start_infinity_zoom(
            document.getElementById('zoom_canvas'),
            document.getElementById('zoom_canvas').getContext('2d'),
            LAYERS_DATA,
            images
         );
      });
   </script>
</body>

</html>
