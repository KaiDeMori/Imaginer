<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Image Region Zoom TRIAL</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
      #gl_canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #000;
      }
      #ui_panel {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="ui_panel"><button id="toggle_region_btn">show_region</button></div>
    <canvas id="gl_canvas"></canvas>
    <script src="../infinity_zoom_II/infinity_zoom_debug.js"></script>
    <script src="./texture_region_zoom_utils.js"></script>
    <script src="./texture_region_zoom.js"></script>
    <script>
      // Patch: force config for TRIAL
      window.infinity_zoom_II = window.infinity_zoom_II || {};
      window.infinity_zoom_II.config = window.infinity_zoom_II.config || {};
      window.infinity_zoom_II.config.region_zoom = {
        anim_duration: 4000,
        region_rect: {
          p0: { x: 1152, y: 1125 },
          p1: { x: 1014, y: 1136 },
          p2: { x: 1004, y: 1036 },
          p3: { x: 1142, y: 1024 },
        },
        image_url: "../zoom_images_planete/debug/100_alien_closeup.jpg",
      };
      // Patch: forcibly re-attach config to region_zoom module if needed
      if (window.infinity_zoom_II.texture_region_zoom) {
        // No set_config or monkey-patch needed for new API
      }
      // Standalone TRIAL: load image, set up region zoom, wire up button
      window.addEventListener("DOMContentLoaded", function () {
        const config = window.infinity_zoom_II.config.region_zoom;
        const canvas = document.getElementById("gl_canvas");
        const gl = canvas.getContext("webgl");
        const btn = document.getElementById("toggle_region_btn");
        let showing_region = false;
        let initial_rotation = Math.random() * Math.PI * 2;
        // Always fill viewport, handle devicePixelRatio
        function resize_canvas() {
          const dpr = window.devicePixelRatio || 1;
          const w = Math.round(window.innerWidth * dpr);
          const h = Math.round(window.innerHeight * dpr);
          canvas.width = w;
          canvas.height = h;
          // All style is in CSS only
          gl.viewport(0, 0, w, h);
          if (window.infinity_zoom_II.texture_region_zoom && window.infinity_zoom_II.texture_region_zoom.resize_texture_region_zoom) {
            window.infinity_zoom_II.texture_region_zoom.resize_texture_region_zoom(w, h);
          }
        }
        window.addEventListener("resize", resize_canvas);
        resize_canvas();
        // Load image and demonstrate both image and texture usage
        const img = new window.Image();
        let pre_uploaded_texture = null;
        img.onload = function () {
          // Option 1: Use image upload (legacy)
          window.infinity_zoom_II.texture_region_zoom.start_texture_region_zoom({
            gl,
            canvas,
            texture: pre_uploaded_texture,
            texture_side: img.width,
            config,
            direction: "in",
            start_transform: { theta: initial_rotation },
            on_complete: function () {
              showing_region = true;
              btn.textContent = "show_full_image (texture)";
            },
          });
          // Option 2: Pre-upload texture and use it (demonstrate new API)
          pre_uploaded_texture = gl.createTexture();
          gl.bindTexture(gl.TEXTURE_2D, pre_uploaded_texture);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
          // Do NOT flip Y: input is already upright
          gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
        };
        img.src = config.image_url;
        // Button toggles between region and full image, using the pre-uploaded texture
        btn.addEventListener("click", function () {
          if (!img.width) return; // not loaded yet
          window.infinity_zoom_II.texture_region_zoom.start_texture_region_zoom({
            gl,
            canvas,
            texture: pre_uploaded_texture,
            texture_side: img.width,
            config,
            direction: showing_region ? "out" : "in",
            start_transform: { theta: initial_rotation },
            on_complete: function () {
              showing_region = !showing_region;
              btn.textContent = showing_region ? "show_full_image (texture)" : "show_region (texture)";
            },
          });
        });
      });
    </script>
  </body>
</html>
