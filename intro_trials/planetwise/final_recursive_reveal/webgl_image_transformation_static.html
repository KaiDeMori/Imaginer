<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>webgl_region_to_canvas_transform_static</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
      #gl_canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #ui_panel {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="ui_panel"><button id="toggle_region_btn">show_region</button></div>
    <canvas id="gl_canvas"></canvas>
    <script>
      // region definition (rectangle, not necessarily square)
      // const region_rect = {
      //   p0: { x: 260, y: 530 }, // origin (top-left)
      //   p1: { x: 470, y: 341 }, // end of top edge (u-axis)
      //   p2: { x: 564, y: 445 }, // far corner (bottom-right)
      //   p3: { x: 353, y: 635 }, // end of left edge (v-axis)
      // };

      //alien display device
      const region_rect = {
        p0: { x: 1152, y: 1125 }, // origin (top-left)
        p1: { x: 1014, y: 1136 }, // end of top edge (u-axis)
        p2: { x: 1004, y: 1036 }, // far corner (bottom-right)
        p3: { x: 1142, y: 1024 }, // end of left edge (v-axis)
      };

      const initial_rotation = Math.random() * Math.PI * 2; // radians

      const image_url =
        "../planetwise/zoom_images_planete/100_alien_closeup.png";

      // ───────────── global variables
      let gl_ctx, gl_program, gl_texture, uniform_matrix;
      let texture_side = 0; // texture side length (px)
      let start_matrix, end_matrix; // mat3, column-major
      let trs_start, trs_end; // {center_x, center_y, scale, theta}
      let showing_region = false;

      // ───────────── matrix helpers (column-major 3×3)
      function mat_mul(a, b) {
        const c = new Float32Array(9);
        for (let i = 0; i < 3; ++i)
          for (let j = 0; j < 3; ++j) {
            let s = 0;
            for (let k = 0; k < 3; ++k) s += a[i + k * 3] * b[k + j * 3];
            c[i + j * 3] = s;
          }
        return c;
      }
      function mat_translate(tx, ty) {
        return new Float32Array([1, 0, 0, 0, 1, 0, tx, ty, 1]);
      }
      function mat_scale(s) {
        return new Float32Array([s, 0, 0, 0, s, 0, 0, 0, 1]);
      }
      function mat_rotate(a) {
        const c = Math.cos(a),
          s = Math.sin(a);
        return new Float32Array([c, s, 0, -s, c, 0, 0, 0, 1]);
      }
      function mat_ortho(w, h) {
        return new Float32Array([2 / w, 0, 0, 0, -2 / h, 0, -1, 1, 1]);
      }
      // ───────────── actually used interpolation functions
      // Unified ease function (strategy) with angle support
      let ease_strategy = ease_linear;
      let ease_strategy_angle = ease_linear;

      // ─────── interpolation functions

      function lerp(a, b, t, is_angle) {
        if (is_angle) {
          let d = b - a;
          while (d > Math.PI) d -= 2 * Math.PI;
          while (d < -Math.PI) d += 2 * Math.PI;
          return a + d * t;
        } else {
          return a * (1 - t) + b * t;
        }
      }

      function ease_linear(a, b, t, is_angle) {
        t = Math.min(Math.max(t, 0), 1);
        return lerp(a, b, t, is_angle);
      }

      function ease_in_out_cubic(a, b, t, is_angle) {
        t = Math.min(Math.max(t, 0), 1);
        if (t < 0.5) {
          return lerp(a, b, 4 * t * t * t, is_angle);
        } else {
          return lerp(a, b, 1 - Math.pow(-2 * t + 2, 3) / 2, is_angle);
        }
      }

      function ease_in_out_exponential(a, b, t, is_angle) {
        t = Math.min(Math.max(t, 0), 1);
        if (t === 0) return a;
        if (t === 1) return b;
        if (t < 0.5)
          return lerp(a, b, 0.5 * Math.pow(2, 20 * t - 10), is_angle);
        return lerp(a, b, 1 - 0.5 * Math.pow(2, -20 * t + 10), is_angle);
      }

      ease_strategy = ease_in_out_cubic;

      ease_strategy_angle = ease_in_out_cubic;

      function build_trs_matrix(trs, w, h) {
        const proj = mat_ortho(w, h);
        return mat_mul(
          proj,
          mat_mul(
            mat_mul(
              mat_mul(mat_translate(w * 0.5, h * 0.5), mat_scale(trs.scale)),
              mat_rotate(trs.theta)
            ),
            mat_translate(-trs.center_x, -trs.center_y)
          )
        );
      }
      // ───────────── animation state
      let animating = false;
      let anim_t = 0; // 0=start, 1=end
      let anim_dir = 1; // 1: to region, -1: to full image
      let anim_start_time = 0;
      const anim_duration = 1600; // ms
      function animate_step(ts) {
        if (!animating) return;
        if (!anim_start_time) anim_start_time = ts;
        let t = (ts - anim_start_time) / anim_duration;
        t = Math.min(Math.max(t, 0), 1);
        anim_t = anim_dir === 1 ? t : 1 - t;
        // Interpolate TRS
        const trs = {
          center_x: ease_strategy(
            trs_start.center_x,
            trs_end.center_x,
            anim_t,
            false
          ),
          center_y: ease_strategy(
            trs_start.center_y,
            trs_end.center_y,
            anim_t,
            false
          ),
          scale: ease_strategy(trs_start.scale, trs_end.scale, anim_t, false),
          theta: ease_strategy_angle(
            trs_start.theta,
            trs_end.theta,
            anim_t,
            true
          ),
        };
        // Build and set matrix
        const canvas = document.getElementById("gl_canvas");
        const mat = build_trs_matrix(trs, canvas.width, canvas.height);
        gl_ctx.clearColor(0, 0, 0, 1);
        gl_ctx.clear(gl_ctx.COLOR_BUFFER_BIT);
        gl_ctx.uniformMatrix3fv(uniform_matrix, false, mat);
        gl_ctx.drawArrays(gl_ctx.TRIANGLE_STRIP, 0, 4);
        if (t < 1) {
          requestAnimationFrame(animate_step);
        } else {
          animating = false;
          showing_region = anim_dir === 1;
          document.getElementById("toggle_region_btn").textContent =
            showing_region ? "show_full_image" : "show_region";
        }
      }
      // ───────────── build matrices for current canvas size
      function build_matrices(w, h) {
        const proj = mat_ortho(w, h);
        // ===== START (whole image covers canvas) =====
        const center_start = { x: texture_side * 0.5, y: texture_side * 0.5 };

        // Calculate a diameter of a circle that inscribes the canvas
        const d_canvas = Math.sqrt(w * w + h * h);
        // Calculate the scale factor to fit the image in the canvas, using the radial distance
        const scale_start = d_canvas / texture_side;

        const a_start = mat_mul(
          mat_mul(
            mat_mul(mat_translate(w * 0.5, h * 0.5), mat_scale(scale_start)),
            mat_rotate(initial_rotation)
          ),
          mat_translate(-center_start.x, -center_start.y)
        );
        start_matrix = mat_mul(proj, a_start);
        // ===== END (region covers canvas) =====
        // region axes
        const vx = region_rect.p1.x - region_rect.p0.x;
        const vy = region_rect.p1.y - region_rect.p0.y;
        const ux = region_rect.p3.x - region_rect.p0.x;
        const uy = region_rect.p3.y - region_rect.p0.y;
        const region_w = Math.hypot(vx, vy);
        const region_h = Math.hypot(ux, uy);
        const region_theta = Math.atan2(vy, vx);
        const center_end = {
          x: (region_rect.p0.x + region_rect.p2.x) * 0.5,
          y: (region_rect.p0.y + region_rect.p2.y) * 0.5,
        };
        const scale_end = Math.max(w / region_w, h / region_h);
        trs_start = {
          center_x: center_start.x,
          center_y: center_start.y,
          scale: scale_start,
          theta: initial_rotation,
        };
        trs_end = {
          center_x: center_end.x,
          center_y: center_end.y,
          scale: scale_end,
          theta: -region_theta,
        };
        const a_end = mat_mul(
          mat_mul(
            mat_mul(mat_translate(w * 0.5, h * 0.5), mat_scale(scale_end)),
            mat_rotate(-region_theta)
          ),
          mat_translate(-center_end.x, -center_end.y)
        );
        end_matrix = mat_mul(proj, a_end);
      }
      // ───────────── draw
      function draw() {
        gl_ctx.clearColor(0, 0, 0, 1);
        gl_ctx.clear(gl_ctx.COLOR_BUFFER_BIT);
        gl_ctx.uniformMatrix3fv(
          uniform_matrix,
          false,
          showing_region ? end_matrix : start_matrix
        );
        gl_ctx.drawArrays(gl_ctx.TRIANGLE_STRIP, 0, 4);
      }
      // ───────────── init
      function init() {
        const canvas = document.getElementById("gl_canvas");
        gl_ctx = canvas.getContext("webgl");

        const vs_src = `precision mediump float;attribute vec2 a_position;attribute vec2 a_tex;uniform mat3 u_matrix;varying vec2 v_tex;void main(){vec3 p=u_matrix*vec3(a_position,1.0);gl_Position=vec4(p.xy,0.0,1.0);v_tex=a_tex;}`;
        const fs_src = `precision mediump float;varying vec2 v_tex;uniform sampler2D u_texture;void main(){gl_FragColor=texture2D(u_texture,v_tex);}`;
        const vs = gl_ctx.createShader(gl_ctx.VERTEX_SHADER);
        gl_ctx.shaderSource(vs, vs_src);
        gl_ctx.compileShader(vs);
        const fs = gl_ctx.createShader(gl_ctx.FRAGMENT_SHADER);
        gl_ctx.shaderSource(fs, fs_src);
        gl_ctx.compileShader(fs);
        gl_program = gl_ctx.createProgram();
        gl_ctx.attachShader(gl_program, vs);
        gl_ctx.attachShader(gl_program, fs);
        gl_ctx.linkProgram(gl_program);
        gl_ctx.useProgram(gl_program);
        uniform_matrix = gl_ctx.getUniformLocation(gl_program, "u_matrix");
        const img = new Image();
        img.onload = () => {
          texture_side = img.width;
          // create buffers now that we know "side"
          const pos = new Float32Array([
            0,
            0,
            texture_side,
            0,
            0,
            texture_side,
            texture_side,
            texture_side,
          ]);
          const uv = new Float32Array([0, 0, 1, 0, 0, 1, 1, 1]);
          const pos_buf = gl_ctx.createBuffer();
          gl_ctx.bindBuffer(gl_ctx.ARRAY_BUFFER, pos_buf);
          gl_ctx.bufferData(gl_ctx.ARRAY_BUFFER, pos, gl_ctx.STATIC_DRAW);
          const loc_pos = gl_ctx.getAttribLocation(gl_program, "a_position");
          gl_ctx.enableVertexAttribArray(loc_pos);
          gl_ctx.vertexAttribPointer(loc_pos, 2, gl_ctx.FLOAT, false, 0, 0);
          const uv_buf = gl_ctx.createBuffer();
          gl_ctx.bindBuffer(gl_ctx.ARRAY_BUFFER, uv_buf);
          gl_ctx.bufferData(gl_ctx.ARRAY_BUFFER, uv, gl_ctx.STATIC_DRAW);
          const loc_uv = gl_ctx.getAttribLocation(gl_program, "a_tex");
          gl_ctx.enableVertexAttribArray(loc_uv);
          gl_ctx.vertexAttribPointer(loc_uv, 2, gl_ctx.FLOAT, false, 0, 0);
          // texture
          gl_texture = gl_ctx.createTexture();
          gl_ctx.bindTexture(gl_ctx.TEXTURE_2D, gl_texture);
          gl_ctx.texParameteri(
            gl_ctx.TEXTURE_2D,
            gl_ctx.TEXTURE_MIN_FILTER,
            gl_ctx.LINEAR
          );
          gl_ctx.texParameteri(
            gl_ctx.TEXTURE_2D,
            gl_ctx.TEXTURE_MAG_FILTER,
            gl_ctx.LINEAR
          );
          gl_ctx.texParameteri(
            gl_ctx.TEXTURE_2D,
            gl_ctx.TEXTURE_WRAP_S,
            gl_ctx.CLAMP_TO_EDGE
          );
          gl_ctx.texParameteri(
            gl_ctx.TEXTURE_2D,
            gl_ctx.TEXTURE_WRAP_T,
            gl_ctx.CLAMP_TO_EDGE
          );
          gl_ctx.texImage2D(
            gl_ctx.TEXTURE_2D,
            0,
            gl_ctx.RGBA,
            gl_ctx.RGBA,
            gl_ctx.UNSIGNED_BYTE,
            img
          );
          resize_canvas();
          draw();
        };
        img.src = image_url;
        window.addEventListener("resize", () => {
          resize_canvas();
          draw();
        });
        document
          .getElementById("toggle_region_btn")
          .addEventListener("click", () => {
            if (animating) return;
            animating = true;
            anim_dir = showing_region ? -1 : 1;
            anim_start_time = 0;
            requestAnimationFrame(animate_step);
          });
      }
      function resize_canvas() {
        const canvas = document.getElementById("gl_canvas");
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        gl_ctx.viewport(0, 0, canvas.width, canvas.height);
        build_matrices(canvas.width, canvas.height);
      }
      init();
    </script>
  </body>
</html>
