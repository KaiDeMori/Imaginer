<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGL Viewport Covering Test</title>
    <script src="infinity_zoom_II/infinity_zoom_debug.js"></script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: black;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <canvas id="webgl_canvas"></canvas>

    <script>
      // Simple matrix utilities
      function make_identity_matrix() {
        return [1, 0, 0, 0, 1, 0, 0, 0, 1];
      }

      function make_scale_matrix(scale_x, scale_y) {
        return [scale_x, 0, 0, 0, scale_y, 0, 0, 0, 1];
      }

      function make_covering_matrix(canvas_width, canvas_height) {
        const viewport_aspect = canvas_width / canvas_height;
        const image_aspect = 1.0; // Square image

        if (viewport_aspect > image_aspect) {
          // Wider viewport - fit width, crop top/bottom
          return make_scale_matrix(1.0, viewport_aspect);
        } else {
          // Taller viewport - fit height, crop sides
          return make_scale_matrix(1.0 / viewport_aspect, 1.0);
        }
      }
    </script>

    <script>
      const relative_path_to_test_image = "zoom_images_planete/debug/100_alien_closeup.png";

      // Vertex shader source - using infinity zoom version
      const vertex_shader_source = `
            attribute vec2 a_position;
            attribute vec2 a_texcoord;
            varying vec2 v_texcoord;
            uniform mat3 u_matrix;
            
            void main() {
                vec3 pos = u_matrix * vec3(a_position, 1.0);
                gl_Position = vec4(pos.xy, 0, 1);
                v_texcoord = a_texcoord;
            }
        `;

      const infinity_zoom_vertex_shader_source = `
          attribute vec2 a_position;
          attribute vec2 a_texcoord;
          varying vec2 v_texcoord;
          uniform mat3 u_matrix;
          void main() {
            vec3 pos = u_matrix * vec3(a_position, 1.0);
            gl_Position = vec4(pos.xy, 0, 1);
            v_texcoord = a_texcoord;
          }
        `;

      // Fragment shader source
      const fragment_shader_source = `
            precision mediump float;
            uniform sampler2D u_texture;
            varying vec2 v_texcoord;
            
            void main() {
                gl_FragColor = texture2D(u_texture, v_texcoord);
            }
        `;

      function create_shader(gl, type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        return shader;
      }

      function create_program(gl, vertex_shader, fragment_shader) {
        const program = gl.createProgram();
        gl.attachShader(program, vertex_shader);
        gl.attachShader(program, fragment_shader);
        gl.linkProgram(program);
        return program;
      }

      function load_texture(gl, url) {
        const texture = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, texture);

        // Fill with placeholder color while loading (dark red)
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([80, 20, 20, 255]));

        const image = new Image();
        image.onload = function () {
          gl.bindTexture(gl.TEXTURE_2D, texture);

          // THE INFAMOUS Y-FLIP! 🔄
          gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);

          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, image);
          gl.generateMipmap(gl.TEXTURE_2D);

          render();
        };
        image.src = url;

        return texture;
      }

      function setup_simple_quad(gl, program) {
        // Simple quad: positions and texture coordinates
        const vertices = new Float32Array([
          // positions    // tex coords
          -1.0,
          -1.0,
          0.0,
          0.0, // bottom left
          1.0,
          -1.0,
          1.0,
          0.0, // bottom right
          -1.0,
          1.0,
          0.0,
          1.0, // top left
          1.0,
          1.0,
          1.0,
          1.0, // top right
        ]);

        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

        const a_position = gl.getAttribLocation(program, "a_position");
        const a_texcoord = gl.getAttribLocation(program, "a_texcoord");

        gl.enableVertexAttribArray(a_position);
        gl.vertexAttribPointer(a_position, 2, gl.FLOAT, false, 16, 0);

        gl.enableVertexAttribArray(a_texcoord);
        gl.vertexAttribPointer(a_texcoord, 2, gl.FLOAT, false, 16, 8);

        return buffer;
      }

      // Global variables
      let gl, program, texture, buffer, canvas, u_matrix_location, u_texture_location;
      let start_time = 0;

      function render() {
        const now = performance.now();
        if (!start_time) start_time = now;
        const elapsed = (now - start_time) / 1000; // seconds

        // Update canvas size to match viewport
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clear(gl.COLOR_BUFFER_BIT);

        // Create covering matrix with gentle shrinking animation
        const base_covering_matrix = make_covering_matrix(canvas.width, canvas.height);

        // DEBUG: Use standardized debug helper
        log_matrix_debug("TRIALS", canvas, null, base_covering_matrix, undefined, undefined);
        const shrink_amount = (0.05 * (1 + Math.sin(elapsed * 0.8))) / 2; // 0 to 0.05 (0% to 5% shrink)
        const scale_animation = 1.0 - shrink_amount; // 1.0 down to 0.95, back to 1.0

        // Apply animation scale to covering matrix
        const animated_matrix = [
          base_covering_matrix[0] * scale_animation,
          base_covering_matrix[1],
          base_covering_matrix[2],
          base_covering_matrix[3],
          base_covering_matrix[4] * scale_animation,
          base_covering_matrix[5],
          base_covering_matrix[6],
          base_covering_matrix[7],
          base_covering_matrix[8],
        ];

        gl.uniformMatrix3fv(u_matrix_location, false, animated_matrix);

        // Draw
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

        // Continue animation
        requestAnimationFrame(render);
      }

      function init() {
        canvas = document.getElementById("webgl_canvas");
        gl = canvas.getContext("webgl");

        // Create shaders and program
        const vertex_shader = create_shader(gl, gl.VERTEX_SHADER, vertex_shader_source);
        const fragment_shader = create_shader(gl, gl.FRAGMENT_SHADER, fragment_shader_source);
        program = create_program(gl, vertex_shader, fragment_shader);

        gl.useProgram(program);

        // Setup WebGL state
        gl.clearColor(0.0, 0.0, 0.0, 1.0);

        // Get uniform locations
        u_matrix_location = gl.getUniformLocation(program, "u_matrix");
        u_texture_location = gl.getUniformLocation(program, "u_texture");
        gl.uniform1i(u_texture_location, 0);

        // Setup simple quad geometry
        buffer = setup_simple_quad(gl, program);

        // Load texture - animation starts only after image loads
        texture = load_texture(gl, relative_path_to_test_image);
      }

      // Start when page loads
      window.addEventListener("load", init);
    </script>
  </body>
</html>
