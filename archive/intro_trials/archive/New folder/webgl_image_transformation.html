<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="utf-8">
   <title>WebGL Region-Cover Demo</title>
   <style>
      html,
      body {
         margin: 0;
         padding: 0;
         height: 100%;
         width: 100%;
         overflow: hidden;
         background: #000;
      }

      canvas {
         display: block;
         width: 100%;
         height: 100%;
      }
   </style>
</head>

<body>
   <canvas id="glcanvas"></canvas>
   <script>
      (() => {

         const IMAGE_URL = '../planetwise/zoom_images_planete/debug/100_alien_closeup_debug_display_square.png';

         // Region corner coordinates in pixel space (origin = top-left in the image)
         // p1 = left-upper, p2 = right-upper, p4 = left-lower
         //debug square
         const REGION = {
            p1: [170, 492], // origin (top-left)
            p2: [354, 424], // end of top edge (u-axis)
            p3: [421, 607], // far corner (bottom-right)
            p4: [237, 675]  // end of left edge (v-axis)
         };


         const canvas = document.getElementById('glcanvas');
         const gl = canvas.getContext('webgl');
         if (!gl) {
            alert('WebGL not supported');
            return;
         }

         // ─────────────────────────── Shaders
         const vertSrc = `
attribute vec2 a_position;
uniform   mat3 u_clipToTex;
varying   vec2 v_uv;
void main(){
  gl_Position = vec4(a_position,0.0,1.0);
  vec3 uv = u_clipToTex * vec3(a_position,1.0);
  v_uv = uv.xy;
}`;

         const fragSrc = `
precision mediump float;
uniform sampler2D u_texture;
varying vec2      v_uv;
void main(){
  gl_FragColor = texture2D(u_texture, v_uv);
}`;

         function compileShader(src, type) {
            const s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
               throw new Error('Shader compile error:\n' + gl.getShaderInfoLog(s));
            }
            return s;
         }

         function createProgram(vs, fs) {
            const p = gl.createProgram();
            gl.attachShader(p, compileShader(vs, gl.VERTEX_SHADER));
            gl.attachShader(p, compileShader(fs, gl.FRAGMENT_SHADER));
            gl.linkProgram(p);
            if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
               throw new Error('Program link error:\n' + gl.getProgramInfoLog(p));
            }
            return p;
         }

         const program = createProgram(vertSrc, fragSrc);
         gl.useProgram(program);

         const posLoc = gl.getAttribLocation(program, 'a_position');
         const matrixLoc = gl.getUniformLocation(program, 'u_clipToTex');
         const texLoc = gl.getUniformLocation(program, 'u_texture');

         // ─────────────────────────── Full-screen quad
         const quadBuf = gl.createBuffer();
         gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
         gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
            -1, -1,
            1, -1,
            -1, 1,
            1, 1
         ]), gl.STATIC_DRAW);

         gl.enableVertexAttribArray(posLoc);
         gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

         // ─────────────────────────── Texture setup
         const tex = gl.createTexture();
         gl.bindTexture(gl.TEXTURE_2D, tex);
         gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
         gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
         gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
         gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
         // Tiny placeholder until the real image is loaded
         gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0,
            gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([0, 0, 0, 255]));

         // ─────────────────────────── Helper math
         function length2D(v) { return Math.hypot(v[0], v[1]); }

         function mul3x3(A, B) { // column-major 3×3
            const C = new Float32Array(9);
            for (let i = 0; i < 3; ++i) {
               for (let j = 0; j < 3; ++j) {
                  C[i * 3 + j] = A[i * 3 + 0] * B[0 * 3 + j] +
                     A[i * 3 + 1] * B[1 * 3 + j] +
                     A[i * 3 + 2] * B[2 * 3 + j];
               }
            }
            return C;
         }

         function computeMatrix(viewW, viewH, S) {
            const [x1, y1] = REGION.p1;
            const [x2, y2] = REGION.p2;
            const [x4, y4] = REGION.p4;

            const v1 = [x2 - x1, y2 - y1];
            const v2 = [x4 - x1, y4 - y1];
            const w = length2D(v1);
            const h = length2D(v2);
            const s = Math.max(viewW / w, viewH / h);

            // F matrix (image-pixels → texture UV)
            const invS = 1 / S;
            const F = new Float32Array([
               invS, 0, 0,
               0, -invS, 1,
               0, 0, 1
            ]);

            // R matrix (unit → image-pixels)
            const R = new Float32Array([
               v1[0], v2[0], x1,
               v1[1], v2[1], y1,
               0, 0, 1
            ]);

            // B matrix (clip → unit rectangle with cover scale)
            const B = new Float32Array([
               0.5 * s, 0, 0.5,
               0, 0.5 * s, 0.5,
               0, 0, 1
            ]);

            // M = F * R * B
            return mul3x3(mul3x3(F, R), B);
         }

         // ─────────────────────────── Resize handling
         function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const displayW = Math.floor(canvas.clientWidth * dpr);
            const displayH = Math.floor(canvas.clientHeight * dpr);
            if (canvas.width !== displayW || canvas.height !== displayH) {
               canvas.width = displayW;
               canvas.height = displayH;
            }
            gl.viewport(0, 0, canvas.width, canvas.height);
         }

         window.addEventListener('resize', () => requestAnimationFrame(draw));

         // ─────────────────────────── Rendering
         let imageReady = false;
         const img = new Image();
         img.src = IMAGE_URL;
         img.onload = () => {
            imageReady = true;
            gl.bindTexture(gl.TEXTURE_2D, tex);
            gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false); // we flip in the matrix
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA,
               gl.UNSIGNED_BYTE, img);
            requestAnimationFrame(draw);
         };

         function draw() {
            if (!imageReady) return;
            resizeCanvas();
            const M = computeMatrix(canvas.width, canvas.height, img.width); // img is square ⇒ width==height
            gl.useProgram(program);
            gl.uniformMatrix3fv(matrixLoc, false, M);
            gl.uniform1i(texLoc, 0);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
         }
      })();
   </script>
</body>

</html>
