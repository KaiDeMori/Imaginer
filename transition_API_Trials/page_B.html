<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="expect" href="#main-img" blocking="render" />
    <style>
      @view-transition {
        navigation: auto;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        view-transition-name: main-image;
      }
      ::view-transition-old(main-image),
      ::view-transition-new(main-image) {
        animation-duration: 3s;
        animation-timing-function: ease-in-out;
      }
    </style>
  </head>
  <body>
    <img id="main-img" />
    <script>
      const DELAY_MS = 5000;

      console.log("Page B loading started - will set image src after", DELAY_MS, "ms delay");

      const img = document.getElementById("main-img");

      setTimeout(() => {
        console.log("Setting image source after delay");
        img.src = "../assets/dummy_pictures/Final_recursion.jpg";

        img.onload = () => {
          console.log("Image loaded successfully");
        };
      }, DELAY_MS);
    </script>
  </body>
</html>
