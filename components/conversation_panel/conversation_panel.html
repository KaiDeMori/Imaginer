<div class="conversation-panel">
  <div class="conversation-header">
    <span class="conversation-title">Conversation</span>
    <button id="new-conversation-btn" class="secondary-btn">New Conversation</button>
  </div>

  <div class="conversation-history" id="conversation-history">
    <!-- Messages will be injected here -->
  </div>

  <div class="conversation-input-section">
    <div class="image-input-area" id="conversation-image-drop-area">
      <div class="drop-placeholder" id="conversation-drop-placeholder">
        <span>Drag & Drop Images</span>
      </div>
    </div>

    <div class="resize-handle-horizontal" id="conversation-resize-handle"></div>

    <div class="prompt-area" id="conversation-prompt-area">
      <textarea id="conversation-prompt-input" placeholder="Type a message..."></textarea>
      <button id="conversation-send-btn" class="primary-btn">Send</button>
    </div>
  </div>
</div>
