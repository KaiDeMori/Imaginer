<div class="overlay">
  <div class="dialog">
    <h2 class="title">Configuration</h2>

    <div class="tab_bar">
      <button class="tab_button active" id="basic_tab_button">Basic</button>
      <button class="tab_button" id="advanced_tab_button">Advanced</button>
    </div>

    <div class="tab_content" id="basic_tab_content">
      <div class="field field_stacked">
        <label class="label" for="api_key_input">OpenAI API Key</label>
        <form class="form" autocomplete="off" id="api_key_form">
          <input
            type="text"
            name="username"
            autocomplete="username"
            value="user"
            tabindex="-1"
            aria-hidden="true"
            style="position: absolute; opacity: 0; height: 0; width: 0; pointer-events: none"
          />
          <input type="text" placeholder="sk-..." autocomplete="off" data-lpignore="true" data-form-type="other" class="input" id="api_key_input" />
          <button type="submit" class="button test_button" id="test_button">Test</button>
          <span class="feedback" id="test_feedback"></span>
        </form>
      </div>

      <div class="field field_inline">
        <label class="label" for="max_input">Maximum number of parallel generations</label>
        <input type="number" size="3" min="1" max="10" step="1" class="input" id="max_input" />
      </div>

      <div class="field field_inline">
        <label class="label" for="n_input">Number of images to generate (n)</label>
        <input type="number" size="3" min="1" max="10" step="1" class="input" id="n_input" />
      </div>

      <div class="field field_inline">
        <label class="label" for="background_select">Background</label>
        <select class="input" id="background_select">
          <option value="auto">Automatic</option>
          <option value="transparent">Transparent</option>
          <option value="opaque">Opaque</option>
        </select>
      </div>

      <div class="field field_inline">
        <label class="label" for="quality_select">Image quality</label>
        <select class="input" id="quality_select">
          <option value="auto">Automatic</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>

      <div class="field field_inline">
        <label class="label" for="input_fidelity_select">Input fidelity</label>
        <select class="input" id="input_fidelity_select">
          <option value="low">Low (default)</option>
          <option value="high">High</option>
        </select>
      </div>
    </div>

    <div class="tab_content" id="advanced_tab_content" style="display: none">
      <div class="section">
        <label class="checkbox_label">
          <input type="checkbox" id="strip_checkbox" />
          <span>Strip Server-Side metadata</span>
        </label>
      </div>

      <div class="section_column">
        <div class="prompt_group_label">Embed prompt:</div>
        <label class="checkbox_label">
          <input type="checkbox" id="prompt_checkbox" />
          <span>as <code>iTXt</code> (standard PNG text chunk)</span>
        </label>
        <label class="checkbox_label">
          <input type="checkbox" id="prompt_xmp_checkbox" />
          <span>as <code>XMP</code> (for Adobe/metadata-aware tools)</span>
        </label>
      </div>

      <div class="section">
        <label class="checkbox_label">
          <input type="checkbox" id="advanced_size_mode_checkbox" />
          <span>Advanced size setting (<code>gpt-image-2</code> ONLY!)</span>
        </label>
      </div>

      <div class="section">
        <label class="checkbox_label">
          <input type="checkbox" id="show_mask_mode_checkbox" />
          <span>Show Mask Mode Button</span>
        </label>
      </div>

      <div class="section">
        <label class="checkbox_label">
          <input type="checkbox" id="enable_streaming_checkbox" />
          <span>Enable Image Streaming Preview</span>
        </label>
        <div class="indent">
          <div class="field field_inline">
            <label class="label" for="partial_images_input">Number of partial images</label>
            <input type="number" min="1" max="3" step="1" class="input input_narrow" id="partial_images_input" />
          </div>
        </div>
      </div>

      <button class="button refresh_models_button action_button" id="refresh_models_button">Refresh Image Models</button>
      <button class="button button_delete" id="clear_gallery_button">Delete Gallery</button>
    </div>

    <div class="button_row">
      <button class="button download_button" id="download_all_button">Download All Images</button>
      <div class="button_group">
        <button class="button cancel_button" id="cancel_button">Cancel</button>
        <button class="button save_button" id="save_button">Save</button>
      </div>
    </div>
  </div>
</div>
