<div class="download_progress_overlay">
  <div class="download_progress_dialog">
    <h2 class="download_progress_title">Downloading Gallery</h2>

    <div class="status_text" id="status_text">Preparing download...</div>

    <div class="progress_counter" id="progress_counter" style="display: none">0 / 0</div>

    <div class="progress_container" id="progress_container" style="display: none">
      <div class="progress_bar_fill" id="progress_bar_fill"></div>
    </div>

    <img class="waiting_image" id="waiting_image" src="assets/download/Zipping_Octopus.webp" alt="" style="display: none" />

    <div class="error_message" id="error_message" style="display: none"></div>

    <button class="close_button" id="close_button" style="display: none">Close</button>
  </div>
</div>
