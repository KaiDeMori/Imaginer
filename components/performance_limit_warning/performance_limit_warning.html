<div class="overlay">
  <div class="dialog">
    <h2 class="title">Performance Warning</h2>
    <div class="content">
      <p>
        Imaginer has detected that the gallery contains a large number of images, which is causing performance issues (slow loading, unresponsive interface).
      </p>
      <p>To restore optimal performance, we recommend exporting your images and then clearing the gallery.</p>
    </div>
    <div class="actions">
      <button class="button primary" id="download_all_button">Download All Images (ZIP)</button>
      <button class="button danger" id="clear_gallery_button">Clear Gallery</button>
      <button class="button secondary" id="close_button">Close</button>
    </div>
  </div>
</div>
