<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imaginer User Manual</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        height: 100vh;
      }

      #toc_container {
        width: 300px;
        padding: 20px;
        border-right: 1px solid #ccc;
        overflow-y: auto;
        flex-shrink: 0;
      }

      #toc_container ul {
        list-style: none;
        padding-left: 0;
      }

      #toc_container ul ul {
        padding-left: 20px;
      }

      #toc_container a {
        text-decoration: none;
        color: #333;
        line-height: 1.6;
      }

      #toc_container a:hover {
        text-decoration: underline;
      }

      #content {
        flex: 1;
        padding: 40px;
        overflow-y: auto;
        max-width: 900px;
      }
    </style>
  </head>
  <body>
    <div id="toc_container">
      <h2>Contents</h2>
      <div id="toc"></div>
    </div>

    <div id="content"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <script>
      async function load_manual() {
        const response = await fetch("Imaginer_User_Manual.md");
        const markdown_text = await response.text();

        const toc_items = [];

        const renderer = new marked.Renderer();
        const original_heading = renderer.heading.bind(renderer);

        renderer.heading = function (text, level, raw) {
          const id = raw.toLowerCase().replace(/[^\w]+/g, "-");
          toc_items.push({ text, level, id });
          return `<h${level} id="${id}">${text}</h${level}>`;
        };

        marked.setOptions({ renderer });

        const html_content = marked.parse(markdown_text);
        document.getElementById("content").innerHTML = html_content;

        generate_toc(toc_items);
      }

      function generate_toc(items) {
        let html = "<ul>";
        let current_level = 0;

        for (const item of items) {
          while (current_level < item.level) {
            html += "<ul>";
            current_level++;
          }
          while (current_level > item.level) {
            html += "</ul>";
            current_level--;
          }

          html += `<li><a href="#${item.id}">${item.text}</a></li>`;
        }

        while (current_level > 0) {
          html += "</ul>";
          current_level--;
        }
        html += "</ul>";

        document.getElementById("toc").innerHTML = html;
      }

      load_manual();
    </script>
  </body>
</html>
