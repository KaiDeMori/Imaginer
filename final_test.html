<!DOCTYPE html>
<html>

    <style>
      body {
        background: #000;
        padding: 20px;
        font-family: system-ui;
        color: #fff;
      }
      .fixed {
        position: fixed;
        top: 110px;
        left: 30px;
        z-index: 999;
      }

  </head>
  <body>
    <div>Regular context:</div>
    <div style="opacity: 0.85">Amio (opacity 0.85)</div>
    <div>Amio (opacity 1)</div>

    <div class="fixed">
      <div>Fixed context:</div>
      <div style="opacity: 0.85">Amio (opacity 0.85)</div>
      <div>Amio (opacity 1)</div>
    </div>
  </body>
</html>
